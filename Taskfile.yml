version: "3"

tasks:
  hooks:
    desc: Run tracked git hook parity and pre-commit hooks when available.
    cmds:
      - pnpm run hook:pre-commit
      - pnpm run hook:pre-push
      - node scripts/run-precommit-hooks.mjs --all-files

  format:check:
    desc: Check formatting.
    cmds:
      - pnpm run format:check

  format:
    desc: Format tracked source files.
    cmds:
      - pnpm run format

  lint:
    desc: Run ESLint.
    cmds:
      - pnpm run lint

  typecheck:
    desc: Run TypeScript type checking.
    cmds:
      - pnpm run typecheck

  test:cov:
    desc: Run unit tests with coverage.
    cmds:
      - pnpm run test:coverage

  test:
    desc: Run unit tests.
    cmds:
      - pnpm test

  audit:
    desc: Run pnpm audit.
    cmds:
      - pnpm run audit

  licenses:
    desc: Check dependency licenses.
    cmds:
      - pnpm run licenses:check

  build:
    desc: Build TypeScript output.
    cmds:
      - pnpm run build

  workflows:lint:
    desc: Validate workflow guards and run available workflow linters.
    cmds:
      - node scripts/check-workflow-guards.mjs
      - bash scripts/run-workflow-lints.sh

  doppler:check:
    desc: Validate the tracked Doppler secret inventory for local parity.
    cmds:
      - bash -lc "ALLOW_DOPPLER_OFFLINE=1 DOPPLER_LIVE_CHECK=0 bash scripts/verify-doppler-secrets.sh"

  sbom:
    desc: Generate a local CycloneDX SBOM artifact.
    cmds:
      - pnpm run sbom

  security:local:
    desc: Run best-effort local security checks with installed optional tools.
    cmds:
      - bash scripts/run-security-local.sh

  security:
    desc: Run local security gates.
    cmds:
      - task: audit
      - task: licenses
      - task: workflows:lint
      - task: doppler:check

  pack:dry-run:
    desc: Verify package contents with pnpm pack dry-run.
    cmds:
      - pnpm pack --dry-run

  release:dry-run:
    desc: Validate release metadata and package assets without publishing.
    cmds:
      - pnpm run release:dry-run

  ci:
    desc: Run local parity gates used before pushing.
    cmds:
      - task: format:check
      - task: lint
      - task: typecheck
      - task: test:cov
      - task: audit
      - task: licenses
      - task: build
      - task: release:dry-run
      - pnpm run sync-version -- --check
      - pnpm run pack:check
      - task: workflows:lint
      - task: doppler:check
      - task: sbom
      - task: pack:dry-run
