# Auto-label rules based on changed paths

"type:feature":
  - changed-files:
      - any-glob-to-any-file:
          - src/tools/**
          - src/ssh-config.ts

"type:bug":
  - changed-files:
      - any-glob-to-any-file:
          - src/**

"area:security":
  - changed-files:
      - any-glob-to-any-file:
          - src/auth.ts
          - src/safety.ts
          - src/http-security.ts
          - src/policy.ts
          - docs/security/**

"area:docs":
  - changed-files:
      - any-glob-to-any-file:
          - docs/**
          - "*.md"
          - README.md

"area:ci":
  - changed-files:
      - any-glob-to-any-file:
          - .github/workflows/**
          - .azure/pipelines/**
          - .gitlab-ci.yml

"area:tests":
  - changed-files:
      - any-glob-to-any-file:
          - test/**

"area:docker":
  - changed-files:
      - any-glob-to-any-file:
          - Dockerfile
          - docker-compose.yml

"area:config":
  - changed-files:
      - any-glob-to-any-file:
          - package.json
          - tsconfig.json
          - .pre-commit-config.yaml
          - renovate.json

"area:ssh":
  - changed-files:
      - any-glob-to-any-file:
          - src/ssh-config.ts
          - src/session.ts
          - src/tunnel.ts

"area:deps":
  - changed-files:
      - any-glob-to-any-file:
          - package-lock.json
          - package.json
