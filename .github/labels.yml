# Label definitions synced by sync-labels.yml.

- name: "type:bug"
  color: "d73a4a"
  description: "Something is not working"

- name: "type:feature"
  color: "a2eeef"
  description: "New feature or request"

- name: "type:chore"
  color: "e4e669"
  description: "Maintenance, refactoring, tooling"

- name: "type:docs"
  color: "0075ca"
  description: "Documentation improvements"

- name: "type:security"
  color: "e11d48"
  description: "Security fix or improvement"

- name: "area:security"
  color: "b91c1c"
  description: "Auth, safety, policy, HTTP security"

- name: "area:ssh"
  color: "1d4ed8"
  description: "SSH session, tunnel, config"

- name: "area:docker"
  color: "0ea5e9"
  description: "Dockerfile and docker-compose"

- name: "area:ci"
  color: "6366f1"
  description: "CI/CD workflows"

- name: "area:docs"
  color: "3b82f6"
  description: "Documentation changes"

- name: "area:tests"
  color: "8b5cf6"
  description: "Test files"

- name: "area:deps"
  color: "10b981"
  description: "Dependency updates"

- name: "area:config"
  color: "f59e0b"
  description: "Config files"

- name: "priority:p0"
  color: "dc2626"
  description: "Critical; fix immediately"

- name: "priority:p1"
  color: "ea580c"
  description: "High priority"

- name: "priority:p2"
  color: "ca8a04"
  description: "Medium priority"

- name: "priority:p3"
  color: "65a30d"
  description: "Low priority"

- name: "status:stale"
  color: "e5e7eb"
  description: "No activity for 60+ days"

- name: "status:blocked"
  color: "f87171"
  description: "Blocked by external factor"

- name: "status:wip"
  color: "fbbf24"
  description: "Work in progress"

- name: "pinned"
  color: "111827"
  description: "Pinned; never auto-close"

- name: "security"
  color: "7f1d1d"
  description: "Security-related; never auto-close"
