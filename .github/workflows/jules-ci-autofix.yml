name: Jules Maintenance Agent

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Jules task mode"
        required: true
        default: "ci-failure"
        type: choice
        options:
          - ci-failure
          - dependency
          - issue
      run_id:
        description: "Failed GitHub Actions run_id for ci-failure mode"
        required: false
        type: string
      issue_number:
        description: "Issue number for issue mode"
        required: false
        type: string
  issues:
    types: [labeled]

permissions:
  actions: read
  contents: read
  issues: read
  pull-requests: read

concurrency:
  group: jules-agent-${{ inputs.run_id || inputs.issue_number || github.event.issue.number || github.run_id }}
  cancel-in-progress: false

env:
  MAX_AUTOFIX_ATTEMPTS: "8"
  ATTEMPT_WINDOW_HOURS: "24"
  FAILED_LOG_MAX_CHARS: "70000"
  TRUSTED_ISSUE_AUTHORS: ${{ vars.JULES_TRUSTED_AUTHORS || 'oaslananka' }}

jobs:
  jules:
    name: Invoke Jules with guarded context
    if: >-
      github.repository == 'oaslananka-lab/mcp-ssh-tool' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'issues' &&
          contains(github.event.issue.labels.*.name, 'jules')
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Build Jules context
        id: ctx
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number || '' }}
          MANUAL_MODE: ${{ inputs.mode || '' }}
          MANUAL_RUN_ID: ${{ inputs.run_id || '' }}
          MANUAL_ISSUE_NUMBER: ${{ inputs.issue_number || '' }}
        run: |
          set -euo pipefail

          mkdir -p .jules-ci

          is_trusted_author() {
            local author="$1"
            local csv=",${TRUSTED_ISSUE_AUTHORS// /},"
            [[ "$csv" == *",$author,"* ]]
          }

          write_outputs() {
            {
              echo "skip=false"
              echo "starting_branch=$1"
              echo "prompt<<__JULES_PROMPT__"
              cat .jules-ci/prompt.md
              echo "__JULES_PROMPT__"
            } >> "$GITHUB_OUTPUT"
          }

          skip_with_reason() {
            {
              echo "skip=true"
              echo "skip_reason=$1"
            } >> "$GITHUB_OUTPUT"
            exit 0
          }

          mode="${MANUAL_MODE:-ci-failure}"

          if [[ "$EVENT_NAME" == "issues" ]]; then
            mode="issue"
            issue_number="$EVENT_ISSUE_NUMBER"
          elif [[ "$mode" == "issue" ]]; then
            issue_number="$MANUAL_ISSUE_NUMBER"
          else
            issue_number=""
          fi

          if [[ "$mode" == "issue" ]]; then
            if [[ -z "${issue_number}" ]]; then
              skip_with_reason "missing_issue_number"
            fi

            gh issue view "$issue_number" --repo "$REPO" --json number,title,body,author,labels,url > .jules-ci/issue.json
            author="$(jq -r '.author.login // ""' .jules-ci/issue.json)"
            if ! is_trusted_author "$author"; then
              skip_with_reason "untrusted_issue_author_${author}"
            fi

            python3 - <<'PY'
          import json
          from pathlib import Path

          issue = json.loads(Path(".jules-ci/issue.json").read_text())
          prompt = f"""You are Jules working on a maintainer-approved issue for this repository.

          Objective:
          Inspect the issue, implement only the smallest safe change that addresses it, run the relevant local checks, and open a focused PR. Do not trigger publish, release, package publication, MCP Registry publication, personal mirror, or secret-management workflows. Do not add auto-approve or auto-merge.

          Issue:
          - Number: {issue.get("number")}
          - Title: {issue.get("title")}
          - Author: {(issue.get("author") or {}).get("login")}
          - URL: {issue.get("url")}

          Body:
          ```text
          {issue.get("body") or ""}
          ```
          """
          Path(".jules-ci/prompt.md").write_text(prompt)
          PY
            write_outputs main
            exit 0
          fi

          if [[ "$mode" == "dependency" ]]; then
            cat > .jules-ci/prompt.md <<'EOF'
          You are Jules running a guarded dependency maintenance pass for this repository.

          Objective:
          Inspect dependency update signals, security advisories, lockfile drift, and package-manager determinism. Apply the smallest safe dependency or configuration fix, run the repo's relevant checks, and open a focused PR.

          Guardrails:
          - Do not trigger publish, release, package publication, MCP Registry publication, personal mirror, or secret-management workflows.
          - Do not add unconditional auto-approve or auto-merge.
          - Preserve secure SSH defaults and HTTP auth/origin restrictions.
          - Document postponed major upgrades when compatibility is not clear.
          EOF
            write_outputs main
            exit 0
          fi

          run_id="$MANUAL_RUN_ID"
          if [[ -z "${run_id}" ]]; then
            skip_with_reason "missing_run_id"
          fi

          gh api "repos/${REPO}/actions/runs/${run_id}" > .jules-ci/run.json

          conclusion="$(jq -r '.conclusion // ""' .jules-ci/run.json)"
          workflow_name="$(jq -r '.name // ""' .jules-ci/run.json)"
          workflow_id="$(jq -r '.workflow_id // ""' .jules-ci/run.json)"
          head_branch="$(jq -r '.head_branch // ""' .jules-ci/run.json)"
          head_repo="$(jq -r '.head_repository.full_name // ""' .jules-ci/run.json)"

          if [[ "$conclusion" != "failure" && "$conclusion" != "timed_out" ]]; then
            skip_with_reason "non_failure_conclusion_${conclusion}"
          fi

          if [[ "$workflow_name" == Jules* || "$workflow_name" == *Publish* || "$workflow_name" == *Release* ]]; then
            skip_with_reason "blocked_workflow_${workflow_name// /_}"
          fi

          if [[ "$head_repo" != "$REPO" ]]; then
            skip_with_reason "fork_or_external_head_repo"
          fi

          if [[ -z "$head_branch" || "$head_branch" == "null" || "$head_branch" == jules/* ]]; then
            skip_with_reason "blocked_or_missing_head_branch"
          fi

          if [[ "$MAX_AUTOFIX_ATTEMPTS" != "0" ]]; then
            since="$(date -u -d "${ATTEMPT_WINDOW_HOURS} hours ago" +"%Y-%m-%dT%H:%M:%SZ")"
            gh api -X GET "repos/${REPO}/actions/workflows/${workflow_id}/runs" \
              -f branch="$head_branch" \
              -f status="completed" \
              -f created=">${since}" \
              -F per_page=100 > .jules-ci/recent-runs.json

            failed_count="$(
              jq '[.workflow_runs[] | select(.conclusion == "failure" or .conclusion == "timed_out")] | length' \
                .jules-ci/recent-runs.json
            )"
            if (( failed_count > MAX_AUTOFIX_ATTEMPTS )); then
              skip_with_reason "max_attempts_exceeded_${failed_count}"
            fi
          fi

          gh run view "$run_id" \
            --repo "$REPO" \
            --json databaseId,name,workflowName,displayTitle,event,conclusion,headBranch,headSha,url,createdAt,updatedAt,jobs \
            > .jules-ci/run-view.json

          gh run view "$run_id" --repo "$REPO" --log-failed > .jules-ci/failed.log || true

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          max_chars = int(os.environ.get("FAILED_LOG_MAX_CHARS", "70000"))
          run = json.loads(Path(".jules-ci/run.json").read_text())
          view = json.loads(Path(".jules-ci/run-view.json").read_text())
          logs = Path(".jules-ci/failed.log").read_text(errors="replace") if Path(".jules-ci/failed.log").exists() else ""

          if len(logs) > max_chars:
              logs = "[TRUNCATED: showing tail of failed logs]\n\n" + logs[-max_chars:]

          failed_jobs = []
          for job in view.get("jobs") or []:
              if job.get("conclusion") in {"failure", "timed_out", "cancelled"}:
                  failed_jobs.append({
                      "name": job.get("name"),
                      "conclusion": job.get("conclusion"),
                      "url": job.get("url"),
                      "failed_steps": [
                          {
                              "name": step.get("name"),
                              "conclusion": step.get("conclusion"),
                              "number": step.get("number"),
                          }
                          for step in job.get("steps", [])
                          if step.get("conclusion") not in {None, "success", "skipped"}
                      ],
                  })

          prompt = f"""You are Jules running a guarded CI failure repair for this repository.

          Objective:
          Fix the root cause of the failed GitHub Actions run. Continue locally until the relevant checks pass. Create a focused PR with the minimal safe change.

          Guardrails:
          - Do not trigger publish, release, package publication, MCP Registry publication, personal mirror, or secret-management workflows.
          - Do not add unconditional auto-approve or auto-merge.
          - Do not weaken SSH safety defaults, host-key verification, policy controls, HTTP bearer auth, or origin restrictions.
          - If the failure is external or credential-related, document the diagnosis and make only safe config hardening changes.

          Failed run:
          - Repository: {os.environ["REPO"]}
          - Workflow: {run.get("name")}
          - Display title: {run.get("display_title")}
          - Event: {run.get("event")}
          - Conclusion: {run.get("conclusion")}
          - Branch: {run.get("head_branch")}
          - Commit: {run.get("head_sha")}
          - URL: {run.get("html_url")}

          Failed jobs / steps:
          ```json
          {json.dumps(failed_jobs, indent=2, ensure_ascii=False)}
          ```

          Failed logs:
          ```text
          {logs}
          ```
          """
          Path(".jules-ci/prompt.md").write_text(prompt)
          PY

          write_outputs "$head_branch"

      - name: Invoke Jules
        if: steps.ctx.outputs.skip != 'true'
        uses: google-labs-code/jules-invoke@bff7875eaa123cac6742b7cfc51005b95ba4d566
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: ${{ steps.ctx.outputs.starting_branch }}
          include_last_commit: true
          include_commit_log: true
          prompt: ${{ steps.ctx.outputs.prompt }}

      - name: Report skipped Jules run
        if: steps.ctx.outputs.skip == 'true'
        env:
          SKIP_REASON: ${{ steps.ctx.outputs.skip_reason }}
        run: |
          echo "Jules skipped: ${SKIP_REASON}"
