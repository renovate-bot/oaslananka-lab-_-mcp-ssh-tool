name: Branch Hygiene

on:
  schedule:
    - cron: "23 5 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  report:
    name: Monthly Branch Hygiene Report
    if: ${{ github.repository == 'oaslananka-lab/mcp-ssh-tool' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Report stale branches
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cutoff="$(date -u -d '90 days ago' +%s)"
          gh api repos/oaslananka-lab/mcp-ssh-tool/branches --paginate \
            --jq '.[] | select(.protected | not) | [.name, .commit.sha] | @tsv' |
          while IFS=$'\t' read -r branch sha; do
            date_iso="$(gh api repos/oaslananka-lab/mcp-ssh-tool/commits/$sha --jq '.commit.committer.date')"
            date_epoch="$(date -u -d "$date_iso" +%s)"
            if [ "$date_epoch" -lt "$cutoff" ]; then
              echo "STALE branch=$branch last_commit=$date_iso sha=$sha"
            else
              echo "OK branch=$branch last_commit=$date_iso sha=$sha"
            fi
          done
