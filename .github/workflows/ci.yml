name: CI

on:
  push:
    branches:
      - main
      - "chore/**"
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - main
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOPPLER_PROJECT: all
  DOPPLER_CONFIG: main
  HAS_DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN != '' }}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    if: ${{ github.repository == 'oaslananka-lab/mcp-ssh-tool' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Use pinned npm
        run: node scripts/use-ci-npm.mjs

      - name: Install
        run: npm ci

      - name: Quality gate parity
        run: npm run check:quality

  unit:
    name: Unit Tests (Node ${{ matrix.node }})
    if: ${{ github.repository == 'oaslananka-lab/mcp-ssh-tool' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node:
          - 22.22.2
          - 24.14.1
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Use pinned npm
        run: node scripts/use-ci-npm.mjs

      - name: Install
        run: npm ci

      - name: Unit coverage
        run: npm run test:coverage

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: junit-node-${{ matrix.node }}
          path: test-results/**/*.xml
          if-no-files-found: warn

      - name: Upload coverage artifact
        if: always() && matrix.node == '24.14.1'
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore

      - name: Install Doppler CLI
        if: matrix.node == '24.14.1' && env.HAS_DOPPLER_TOKEN == 'true'
        run: curl -Ls https://cli.doppler.com/install.sh | sudo sh

      - name: Export Codecov token from Doppler
        if: matrix.node == '24.14.1' && env.HAS_DOPPLER_TOKEN == 'true'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          doppler run -- bash <<'BASH'
          set -euo pipefail
          test -n "${CODECOV_TOKEN:-}"
          echo "::add-mask::$CODECOV_TOKEN"
          printf 'CODECOV_TOKEN=%s\n' "$CODECOV_TOKEN" >> "$GITHUB_ENV"
          BASH

      - name: Upload coverage to Codecov
        if: matrix.node == '24.14.1' && env.HAS_DOPPLER_TOKEN == 'true'
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          disable_search: true
          fail_ci_if_error: false

  integration:
    name: SSH Integration
    if: ${{ github.repository == 'oaslananka-lab/mcp-ssh-tool' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Use pinned npm
        run: node scripts/use-ci-npm.mjs

      - name: Install
        run: npm ci

      - name: Start SSH fixture
        run: docker compose up -d ssh-server

      - name: Run integration tests
        run: npm run test:integration
        env:
          RUN_SSH_INTEGRATION: "1"
          TEST_SSH_HOST: localhost
          TEST_SSH_PORT: "2222"
          TEST_SSH_USER: testuser
          TEST_SSH_PASS: testpass

      - name: Stop SSH fixture
        if: always()
        run: docker compose down --remove-orphans

      - name: Upload integration JUnit results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: junit-integration
          path: test-results/**/*.xml
          if-no-files-found: warn

  package:
    name: Build, SBOM, and Pack
    if: ${{ github.repository == 'oaslananka-lab/mcp-ssh-tool' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - quality
      - unit
      - integration
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Use pinned npm
        run: node scripts/use-ci-npm.mjs

      - name: Install
        run: npm ci

      - name: Package parity
        run: npm run check:package

      - name: Generate CycloneDX SBOM and package hash
        run: |
          mkdir -p artifacts
          npm sbom --sbom-format=cyclonedx > artifacts/sbom.cdx.json
          PACKAGE_FILE=$(npm pack --pack-destination artifacts --json | node -e "let d=''; process.stdin.on('data', c => d += c); process.stdin.on('end', () => console.log(JSON.parse(d)[0].filename));")
          sha256sum "artifacts/$PACKAGE_FILE" > "artifacts/$PACKAGE_FILE.sha256"

      - name: Upload release verification artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-verification
          path: artifacts
