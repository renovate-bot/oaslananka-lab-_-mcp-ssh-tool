name: Stale

on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

jobs:
  stale:
    name: Stale
    if: github.repository == 'oaslananka-lab/mcp-ssh-tool'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const staleAfterDays = 60;
            const closeAfterDays = 14;
            const staleLabel = "status:stale";
            const exemptLabels = new Set([
              "priority:p0",
              "pinned",
              "security",
              "type:security",
            ]);
            const now = Date.now();
            const staleAgeMs = staleAfterDays * 24 * 60 * 60 * 1000;
            const closeAgeMs = closeAfterDays * 24 * 60 * 60 * 1000;
            const { owner, repo } = context.repo;

            const items = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            for (const item of items) {
              const labels = item.labels.map((label) => label.name);
              if (labels.some((label) => exemptLabels.has(label))) continue;

              const updatedAt = new Date(item.updated_at).getTime();
              const age = now - updatedAt;
              const isPR = Boolean(item.pull_request);

              if (labels.includes(staleLabel)) {
                if (age > closeAgeMs) {
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: item.number,
                    body: "Closing due to inactivity. Re-open if still relevant.",
                  });
                  await github.rest.issues.update({
                    owner,
                    repo,
                    issue_number: item.number,
                    state: "closed",
                  });
                }
              } else if (age > staleAgeMs) {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: item.number,
                  labels: [staleLabel],
                });
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: item.number,
                  body:
                    `This ${isPR ? "PR" : "issue"} has been inactive for ` +
                    `${staleAfterDays} days. It will be closed in ` +
                    `${closeAfterDays} days unless there is activity.`,
                });
              }
            }
