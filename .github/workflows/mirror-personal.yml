name: Mirror Personal Source Backfill

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
      - "mcp-ssh-tool-v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview the mirror push without updating the personal repository"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      force_mirror:
        description: "Allow force-with-lease for explicitly selected refs"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      ref_scope:
        description: "Refs to mirror"
        required: true
        default: "main-and-tags"
        type: choice
        options:
          - main
          - tags
          - main-and-tags
      approval:
        description: "Type MIRROR_AUTOMATION_TO_SOURCE only for force_mirror=true"
        required: true
        default: "DRY_RUN"
        type: string

permissions:
  contents: read

concurrency:
  group: mirror-personal-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  mirror:
    name: Backfill org release refs to personal source
    if: ${{ github.repository == 'oaslananka-lab/mcp-ssh-tool' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Configure mirror remote
        id: mirror-token
        env:
          PERSONAL_REPO_PUSH_TOKEN: ${{ secrets.PERSONAL_REPO_PUSH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${PERSONAL_REPO_PUSH_TOKEN:-}" ]; then
            echo "PERSONAL_REPO_PUSH_TOKEN is not configured; skipping personal source backfill."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::add-mask::${PERSONAL_REPO_PUSH_TOKEN}"
          git remote add personal "https://x-access-token:${PERSONAL_REPO_PUSH_TOKEN}@github.com/oaslananka/mcp-ssh-tool.git"
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Preflight and mirror safe refs
        if: steps.mirror-token.outputs.enabled == 'true'
        env:
          APPROVAL: ${{ inputs.approval || '' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          FORCE_MIRROR: ${{ inputs.force_mirror || 'false' }}
          REF_SCOPE: ${{ inputs.ref_scope || 'main-and-tags' }}
        run: |
          set -euo pipefail

          case "$REF_SCOPE" in
            main|tags|main-and-tags) ;;
            *)
              echo "ref_scope must be main, tags, or main-and-tags."
              exit 1
              ;;
          esac

          if [[ "$FORCE_MIRROR" == "true" ]]; then
            if [[ "$GITHUB_EVENT_NAME" != "workflow_dispatch" || "$APPROVAL" != "MIRROR_AUTOMATION_TO_SOURCE" ]]; then
              echo "force_mirror=true requires workflow_dispatch and approval=MIRROR_AUTOMATION_TO_SOURCE."
              exit 1
            fi
          fi

          push_flags=()
          if [[ "$DRY_RUN" == "true" ]]; then
            push_flags+=(--dry-run)
          fi

          mirror_main() {
            local org_main personal_main
            org_main="$(git rev-parse HEAD)"

            if git fetch --quiet personal refs/heads/main:refs/remotes/personal/main; then
              personal_main="$(git rev-parse refs/remotes/personal/main)"
            else
              personal_main=""
            fi

            if [[ -z "$personal_main" ]]; then
              echo "PLAN: create personal/main at ${org_main}."
              git push "${push_flags[@]}" personal HEAD:refs/heads/main
              return
            fi

            if [[ "$personal_main" == "$org_main" ]]; then
              echo "PLAN: personal/main already matches org automation main (${org_main})."
              return
            fi

            if git merge-base --is-ancestor "$personal_main" "$org_main"; then
              echo "PLAN: fast-forward personal/main ${personal_main} -> ${org_main}."
              git push "${push_flags[@]}" personal HEAD:refs/heads/main
              return
            fi

            if [[ "$FORCE_MIRROR" == "true" ]]; then
              echo "PLAN: force-with-lease personal/main ${personal_main} -> ${org_main}."
              git push "${push_flags[@]}" \
                --force-with-lease=refs/heads/main:"$personal_main" \
                personal HEAD:refs/heads/main
              return
            fi

            echo "Personal source main diverges from org automation main. Run mirror-personal.yml with force_mirror=true, ref_scope=main, approval=MIRROR_AUTOMATION_TO_SOURCE."
            exit 1
          }

          mirror_tags() {
            local personal_refs tag_list
            personal_refs="$(mktemp)"
            if ! {
              git ls-remote --tags personal "refs/tags/v*.*.*"
              git ls-remote --tags personal "refs/tags/mcp-ssh-tool-v*"
            } | grep -v '\^{}' | sort -u > "$personal_refs"; then
              : > "$personal_refs"
            fi

            tag_list_file="${RUNNER_TEMP}/local-tags.txt"
            : > "$tag_list_file"
            if git tag -l "v*.*.*" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' >> "$tag_list_file"; then
              :
            fi
            if git tag -l "mcp-ssh-tool-v*" | grep -E '^mcp-ssh-tool-v[0-9]+\.[0-9]+\.[0-9]+$' >> "$tag_list_file"; then
              :
            fi
            sort -u "$tag_list_file" -o "$tag_list_file"
            tag_list="$(cat "$tag_list_file")"

            while IFS= read -r tag; do
              [[ -z "$tag" ]] && continue
              local org_tag personal_tag
              org_tag="$(git rev-parse "refs/tags/${tag}")"
              personal_tag="$(awk -v ref="refs/tags/${tag}" '$2 == ref { print $1 }' "$personal_refs")"

              if [[ -z "$personal_tag" ]]; then
                echo "PLAN: push missing personal tag ${tag} at ${org_tag}."
                git push "${push_flags[@]}" personal "refs/tags/${tag}:refs/tags/${tag}"
                continue
              fi

              if [[ "$personal_tag" == "$org_tag" ]]; then
                echo "PLAN: personal tag ${tag} already matches org automation tag (${org_tag})."
                continue
              fi

              if [[ "$FORCE_MIRROR" == "true" ]]; then
                echo "PLAN: force-with-lease personal tag ${tag} ${personal_tag} -> ${org_tag}."
                git push "${push_flags[@]}" \
                  --force-with-lease="refs/tags/${tag}:${personal_tag}" \
                  personal "refs/tags/${tag}:refs/tags/${tag}"
                continue
              fi

              echo "Personal source tag ${tag} diverges from org automation tag. Run mirror-personal.yml with force_mirror=true, ref_scope=tags, approval=MIRROR_AUTOMATION_TO_SOURCE."
              exit 1
            done <<< "$tag_list"

            while IFS=$'\t' read -r sha ref; do
              tag="${ref#refs/tags/}"
              if ! git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
                echo "ADVISORY: personal source has extra tag ${tag} (${sha}); this workflow never deletes tags automatically."
              fi
            done < "$personal_refs"
          }

          case "$REF_SCOPE" in
            main)
              mirror_main
              ;;
            tags)
              mirror_tags
              ;;
            main-and-tags)
              mirror_main
              mirror_tags
              ;;
          esac

          if [[ "$DRY_RUN" == "true" ]]; then
            echo "Dry-run backfill completed. No personal repository refs were changed."
          else
            echo "Personal source backfill completed from the organization automation repository."
          fi
