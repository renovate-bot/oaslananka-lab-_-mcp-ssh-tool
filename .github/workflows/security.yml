name: Security

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  merge_group:
    types:
      - checks_requested
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOPPLER_PROJECT: all
  DOPPLER_CONFIG: main
  HAS_DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN != '' }}

jobs:
  codeql:
    name: CodeQL
    if: ${{ github.repository == 'oaslananka-lab/mcp-ssh-tool' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v4

  dependency-review:
    name: Dependency Review
    if: ${{ github.repository == 'oaslananka-lab/mcp-ssh-tool' && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

  scorecard:
    name: OpenSSF Scorecard
    if: ${{ github.repository == 'oaslananka-lab/mcp-ssh-tool' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      security-events: write
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: scorecard-sarif
          path: scorecard.sarif
          if-no-files-found: ignore

  gitleaks:
    name: Gitleaks
    if: ${{ github.repository == 'oaslananka-lab/mcp-ssh-tool' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Run Gitleaks OSS CLI
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            git \
            --no-banner \
            --redact \
            --log-opts="--all" \
            --report-format sarif \
            --report-path /repo/gitleaks.sarif \
            /repo
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: gitleaks.sarif

  hadolint:
    name: Hadolint
    if: ${{ github.repository == 'oaslananka-lab/mcp-ssh-tool' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.test

  trivy:
    name: Trivy
    if: ${{ github.repository == 'oaslananka-lab/mcp-ssh-tool' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Install Trivy CLI
        env:
          TRIVY_VERSION: 0.70.0
          TRIVY_CHECKSUMS_SHA256: c45281240bb9211ea9e830fc0bf5cf8acf7c0ca830feb64ac8a0aa932c5c92d9
          TRIVY_TARBALL_SHA256: 8b4376d5d6befe5c24d503f10ff136d9e0c49f9127a4279fd110b727929a5aa9
        run: |
          set -euo pipefail
          base_url="https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}"
          archive="trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"

          curl -sSfL "${base_url}/trivy_${TRIVY_VERSION}_checksums.txt" -o trivy_checksums.txt
          echo "${TRIVY_CHECKSUMS_SHA256}  trivy_checksums.txt" | sha256sum -c -

          curl -sSfL "${base_url}/${archive}" -o "${archive}"
          echo "${TRIVY_TARBALL_SHA256}  ${archive}" | sha256sum -c -
          grep " ${archive}$" trivy_checksums.txt | sha256sum -c -

          tar -xzf "${archive}" trivy
          sudo install -m 0755 trivy /usr/local/bin/trivy
          trivy --version
      - name: Run Trivy filesystem scan
        run: |
          trivy fs \
            --scanners vuln,misconfig,secret \
            --format sarif \
            --output trivy-results.sarif \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --no-progress \
            .
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

  zizmor:
    name: Zizmor
    if: ${{ github.repository == 'oaslananka-lab/mcp-ssh-tool' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Install zizmor
        run: python3 -m pip install --user zizmor
      - name: Lint workflows
        run: '"$HOME/.local/bin/zizmor" .github/workflows'

  osv:
    name: OSV Scanner
    if: ${{ github.repository == 'oaslananka-lab/mcp-ssh-tool' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Run OSV Scanner CLI
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/google/osv-scanner:v2.3.0 \
            scan source \
            --recursive \
            --format sarif \
            --output /repo/osv-results.sarif \
            /repo
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: osv-results.sarif

  doppler-safety:
    name: Doppler Safety Secret Check
    if: ${{ github.repository == 'oaslananka-lab/mcp-ssh-tool' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Skip when Doppler bootstrap token is unavailable
        if: env.HAS_DOPPLER_TOKEN != 'true'
        run: echo "DOPPLER_TOKEN is unavailable for this event; skipping live Doppler check."
      - name: Install Doppler CLI
        if: env.HAS_DOPPLER_TOKEN == 'true'
        run: curl -Ls https://cli.doppler.com/install.sh | sudo sh
      - name: Validate Doppler inventory
        if: env.HAS_DOPPLER_TOKEN == 'true'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: bash scripts/verify-doppler-secrets.sh
      - name: Verify Safety token is injected through Doppler
        if: env.HAS_DOPPLER_TOKEN == 'true'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          doppler run -- bash <<'BASH'
          set -euo pipefail
          test -n "${SAFETY_API_KEY:-}" && echo "SAFETY_API_KEY injected through Doppler."
          BASH
