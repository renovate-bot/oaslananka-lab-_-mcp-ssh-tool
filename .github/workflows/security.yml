name: Security

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  merge_group:
    types:
      - checks_requested
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOPPLER_PROJECT: all
  DOPPLER_CONFIG: main
  HAS_DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN != '' }}

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  codeql:
    name: CodeQL
    if: ${{ github.repository == 'oaslananka-lab/mcp-ssh-tool' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e

  dependency-review:
    name: Dependency Review
    if: ${{ github.repository == 'oaslananka-lab/mcp-ssh-tool' && github.event_name == 'pull_request' && github.event.pull_request.draft == false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Review dependency changes
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          response_file="${RUNNER_TEMP}/dependency-review.json"
          if ! gh api \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "repos/${GITHUB_REPOSITORY}/dependency-graph/compare/${BASE_SHA}...${HEAD_SHA}" \
            > "${response_file}"; then
            echo "Dependency Graph is not available for this repository yet; skipping dependency review."
            exit 0
          fi

          RESPONSE_FILE="${response_file}" FAIL_ON_SEVERITY=moderate python3 - <<'PY'
          import json
          import os
          import sys

          severity_rank = {"low": 1, "moderate": 2, "medium": 2, "high": 3, "critical": 4}
          fail_rank = severity_rank[os.environ["FAIL_ON_SEVERITY"]]
          with open(os.environ["RESPONSE_FILE"], encoding="utf-8") as handle:
              payload = json.load(handle)

          dependencies = payload if isinstance(payload, list) else payload.get("dependencies", [])
          findings = []
          for dependency in dependencies:
              for vulnerability in dependency.get("vulnerabilities", []) or []:
                  severity = str(vulnerability.get("severity", "")).lower()
                  if severity_rank.get(severity, 0) >= fail_rank:
                      findings.append((dependency, vulnerability))

          if findings:
              for dependency, vulnerability in findings:
                  name = dependency.get("name", "unknown")
                  version = dependency.get("version", "unknown")
                  manifest = dependency.get("manifest", "unknown manifest")
                  advisory = vulnerability.get("advisory_ghsa_id", "unknown advisory")
                  summary = vulnerability.get("advisory_summary", "No summary")
                  severity = vulnerability.get("severity", "unknown")
                  print(f"{manifest}: {name}@{version} has {severity} vulnerability {advisory}: {summary}")
              sys.exit(1)

          print(f"Checked {len(dependencies)} dependency change(s); no moderate-or-higher vulnerabilities found.")
          PY

  scorecard:
    name: OpenSSF Scorecard
    if: ${{ github.repository == 'oaslananka-lab/mcp-ssh-tool' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      security-events: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: false
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        if: always()
        with:
          name: scorecard-sarif
          path: scorecard.sarif
          if-no-files-found: ignore

  gitleaks:
    name: Gitleaks
    if: ${{ github.repository == 'oaslananka-lab/mcp-ssh-tool' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Run Gitleaks OSS CLI
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            git \
            --no-banner \
            --redact \
            --log-opts="--all" \
            --report-format sarif \
            --report-path /repo/gitleaks.sarif \
            /repo
      - uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e
        if: always()
        with:
          sarif_file: gitleaks.sarif

  hadolint:
    name: Hadolint
    if: ${{ github.repository == 'oaslananka-lab/mcp-ssh-tool' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf
        with:
          dockerfile: Dockerfile
      - uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf
        with:
          dockerfile: Dockerfile.test

  trivy:
    name: Trivy
    if: ${{ github.repository == 'oaslananka-lab/mcp-ssh-tool' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - name: Install Trivy CLI
        env:
          TRIVY_VERSION: 0.70.0
          TRIVY_CHECKSUMS_SHA256: c45281240bb9211ea9e830fc0bf5cf8acf7c0ca830feb64ac8a0aa932c5c92d9
          TRIVY_TARBALL_SHA256: 8b4376d5d6befe5c24d503f10ff136d9e0c49f9127a4279fd110b727929a5aa9
        run: |
          set -euo pipefail
          base_url="https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}"
          archive="trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"

          curl -sSfL "${base_url}/trivy_${TRIVY_VERSION}_checksums.txt" -o trivy_checksums.txt
          echo "${TRIVY_CHECKSUMS_SHA256}  trivy_checksums.txt" | sha256sum -c -

          curl -sSfL "${base_url}/${archive}" -o "${archive}"
          echo "${TRIVY_TARBALL_SHA256}  ${archive}" | sha256sum -c -
          grep " ${archive}$" trivy_checksums.txt | sha256sum -c -

          tar -xzf "${archive}" trivy
          sudo install -m 0755 trivy /usr/local/bin/trivy
          trivy --version
      - name: Run Trivy filesystem scan
        run: |
          trivy fs \
            --scanners vuln,misconfig,secret \
            --format sarif \
            --output trivy-results.sarif \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --no-progress \
            .
      - uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e
        if: always()
        with:
          sarif_file: trivy-results.sarif

  zizmor:
    name: Zizmor
    if: ${{ github.repository == 'oaslananka-lab/mcp-ssh-tool' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: 0.11.11
      - name: Lint workflows
        run: uv tool run --from zizmor zizmor --offline --min-severity low .github/workflows

  osv:
    name: OSV Scanner
    if: ${{ github.repository == 'oaslananka-lab/mcp-ssh-tool' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - name: Run OSV Scanner CLI
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/google/osv-scanner:v2.3.0@sha256:6421cdd773a54fad5fd991895b4f3840beba55a2f30a8182185919e13979a2c8 \
            scan source \
            --recursive \
            --format sarif \
            --output /repo/osv-results.sarif \
            /repo
      - uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e
        if: always()
        with:
          sarif_file: osv-results.sarif

  doppler-safety:
    name: Doppler Safety Secret Check
    if: ${{ github.repository == 'oaslananka-lab/mcp-ssh-tool' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - name: Skip when Doppler bootstrap token is unavailable
        if: env.HAS_DOPPLER_TOKEN != 'true'
        run: echo "DOPPLER_TOKEN is unavailable for this event; skipping live Doppler check."
      - name: Install Doppler CLI
        if: env.HAS_DOPPLER_TOKEN == 'true'
        run: curl -Ls https://cli.doppler.com/install.sh | sudo sh
      - name: Validate Doppler inventory
        if: env.HAS_DOPPLER_TOKEN == 'true'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: bash scripts/verify-doppler-secrets.sh
      - name: Verify Safety token is injected through Doppler
        if: env.HAS_DOPPLER_TOKEN == 'true'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          doppler run -- bash <<'BASH'
          set -euo pipefail
          test -n "${SAFETY_API_KEY:-}" && echo "SAFETY_API_KEY injected through Doppler."
          BASH
