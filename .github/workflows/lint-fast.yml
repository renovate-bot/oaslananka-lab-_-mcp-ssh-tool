name: Lint (fast)

on:
  pull_request:
  push:
    branches: ["**"]
  merge_group:

permissions:
  contents: read

env:
  ACTIONLINT_VERSION: v1.7.12

concurrency:
  group: lint-fast-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  meta:
    name: Lint workflows
    if: github.repository == 'oaslananka-lab/mcp-ssh-tool'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Install actionlint
        run: |
          go install "github.com/rhysd/actionlint/cmd/actionlint@${ACTIONLINT_VERSION}"
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: actionlint
        run: actionlint

      - name: yamllint
        run: |
          pip install yamllint --break-system-packages 2>/dev/null || pip install yamllint
          yamllint -d "{extends: relaxed, rules: {line-length: disable}}" .github/

  node-fast:
    name: Node fast checks
    if: github.repository == 'oaslananka-lab/mcp-ssh-tool'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          cache: npm

      - name: Use pinned npm
        run: node scripts/use-ci-npm.mjs

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck
