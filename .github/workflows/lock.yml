name: Lock Closed Threads

on:
  schedule:
    - cron: "45 5 * * *"
  workflow_dispatch:

jobs:
  lock:
    name: Lock Closed Threads
    if: github.repository == 'oaslananka-lab/mcp-ssh-tool'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: dessant/lock-threads@7266a7ce5c1df01b1c6db85bf8cd86c737dadbe7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          issue-inactive-days: "30"
          pr-inactive-days: "30"
          log-output: true
