name: Sync From Canonical

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: "Canonical branch to pull from oaslananka/mcp-ssh-tool"
        required: true
        default: main
      target_branch:
        description: "Org branch to update"
        required: true
        default: main

permissions:
  contents: write

concurrency:
  group: sync-from-canonical-${{ inputs.target_branch }}
  cancel-in-progress: false

jobs:
  sync:
    name: Pull canonical branch into org repository
    if: ${{ github.repository == 'oaslananka-lab/mcp-ssh-tool' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0
          token: ${{ github.token }}
          persist-credentials: false

      - name: Configure Git identity
        run: |
          git config user.name "mcp-ssh-tool sync"
          git config user.email "actions@github.com"

      - name: Pull from canonical source
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SOURCE_BRANCH: ${{ inputs.source_branch }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          git remote add canonical https://github.com/oaslananka/mcp-ssh-tool.git
          git fetch canonical "$SOURCE_BRANCH"
          git reset --hard "canonical/$SOURCE_BRANCH"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/oaslananka-lab/mcp-ssh-tool.git"
          git push origin "HEAD:$TARGET_BRANCH"
