name: Publish Emergency Fallback

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v2.1.0"
        required: true
      approval:
        description: "Type APPROVE_FALLBACK_PUBLISH to use token publish"
        required: true

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOPPLER_PROJECT: all
  DOPPLER_CONFIG: main

concurrency:
  group: emergency-publish-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  publish:
    name: Emergency Token Publish
    if: ${{ github.repository == 'oaslananka-lab/mcp-ssh-tool' && inputs.approval == 'APPROVE_FALLBACK_PUBLISH' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: npm-production
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Use pinned npm
        run: node scripts/use-ci-npm.mjs

      - name: Install Doppler CLI
        run: curl -Ls https://cli.doppler.com/install.sh | sudo sh

      - name: Validate Doppler inventory
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: bash scripts/verify-doppler-secrets.sh

      - name: Install
        run: npm ci

      - name: Validate requested version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          PKG_VER="$(node -p "require('./package.json').version")"
          if [ "$RELEASE_VERSION" != "v${PKG_VER}" ]; then
            echo "Requested version $RELEASE_VERSION does not match package.json v${PKG_VER}."
            exit 1
          fi

      - name: Guard version is unpublished
        run: |
          PKG_NAME="$(node -p "require('./package.json').name")"
          PKG_VER="$(node -p "require('./package.json').version")"
          if npm view "${PKG_NAME}@${PKG_VER}" version --silent >/dev/null 2>&1; then
            echo "ERROR: ${PKG_NAME}@${PKG_VER} already exists on npm."
            exit 1
          fi

      - name: Verify release quality
        run: npm run check

      - name: Publish to npm using Doppler-injected token
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: doppler run -- bash -lc 'NODE_AUTH_TOKEN="$NPM_TOKEN" npm publish --access public --provenance'

      - name: Create organization GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          gh release create "$RELEASE_VERSION" \
            --repo oaslananka-lab/mcp-ssh-tool \
            --target "$GITHUB_SHA" \
            --title "mcp-ssh-tool $RELEASE_VERSION" \
            --generate-notes
