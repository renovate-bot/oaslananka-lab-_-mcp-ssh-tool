name: Publish Emergency Fallback

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v2.1.0"
        required: true
      approval:
        description: "Type APPROVE_FALLBACK_PUBLISH to use token publish"
        required: true

permissions:
  attestations: write
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOPPLER_PROJECT: all
  DOPPLER_CONFIG: main

concurrency:
  group: emergency-publish-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  publish:
    name: Emergency Token Publish
    if: ${{ github.repository == 'oaslananka-lab/mcp-ssh-tool' && inputs.approval == 'APPROVE_FALLBACK_PUBLISH' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: npm-production
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.14.1
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Use pinned npm
        run: node scripts/use-ci-npm.mjs

      - name: Install Doppler CLI
        run: curl -Ls https://cli.doppler.com/install.sh | sudo sh

      - name: Validate Doppler inventory
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: bash scripts/verify-doppler-secrets.sh

      - name: Install
        run: npm ci

      - name: Validate requested version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          PKG_VER="$(node -p "require('./package.json').version")"
          if [ "$RELEASE_VERSION" != "v${PKG_VER}" ]; then
            echo "Requested version $RELEASE_VERSION does not match package.json v${PKG_VER}."
            exit 1
          fi

      - name: Check npm publication state
        id: npm_status
        run: |
          PKG_NAME="$(node -p "require('./package.json').name")"
          PKG_VER="$(node -p "require('./package.json').version")"
          if npm view "${PKG_NAME}@${PKG_VER}" version --silent >/dev/null 2>&1; then
            echo "${PKG_NAME}@${PKG_VER} already exists on npm; continuing with registry and release completion."
            already_published=true
          else
            already_published=false
          fi
          echo "already_published=${already_published}" >> "$GITHUB_OUTPUT"

      - name: Verify release quality
        run: npm run check

      - name: Inspect release state without network mutation
        run: node scripts/release-state.mjs --offline --json

      - name: Generate SBOM and package
        id: pack
        run: |
          mkdir -p artifacts
          npm sbom --sbom-format=cyclonedx > artifacts/sbom.cdx.json
          PACKAGE_FILE=$(npm pack --pack-destination artifacts --json | node -e "let d=''; process.stdin.on('data', c => d += c); process.stdin.on('end', () => console.log(JSON.parse(d)[0].filename));")
          sha256sum "artifacts/$PACKAGE_FILE" > "artifacts/$PACKAGE_FILE.sha256"
          echo "package_file=$PACKAGE_FILE" >> "$GITHUB_OUTPUT"

      - name: Attest package artifact
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: artifacts/${{ steps.pack.outputs.package_file }}

      - name: Attest SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: artifacts/${{ steps.pack.outputs.package_file }}
          sbom-path: artifacts/sbom.cdx.json

      - name: Check MCP Registry publication state
        id: registry_status
        run: |
          SERVER_NAME="$(node -p "require('./server.json').name")"
          PKG_VER="$(node -p "require('./package.json').version")"
          SERVER_ID="$(node -e "console.log(encodeURIComponent(process.argv[1]))" "$SERVER_NAME")"
          LATEST_VER="$(
            curl -fsSL "https://registry.modelcontextprotocol.io/v0.1/servers/${SERVER_ID}/versions/latest" \
              | node -e "let d=''; process.stdin.on('data', c => d += c); process.stdin.on('end', () => console.log(JSON.parse(d).server?.version ?? ''));"
          )" || LATEST_VER=""
          if [ "$LATEST_VER" = "$PKG_VER" ]; then
            echo "${SERVER_NAME}@${PKG_VER} already exists in the MCP Registry."
            already_published=true
          else
            already_published=false
          fi
          echo "already_published=${already_published}" >> "$GITHUB_OUTPUT"

      - name: Publish to npm using Doppler-injected token
        if: ${{ steps.npm_status.outputs.already_published != 'true' }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          PACKAGE_FILE: ${{ steps.pack.outputs.package_file }}
        run: |
          doppler run -- bash <<'BASH'
          set -euo pipefail
          NODE_AUTH_TOKEN="$NPM_TOKEN" npm publish "./artifacts/${PACKAGE_FILE}" --access public --provenance
          BASH

      - name: Install pinned MCP Registry publisher
        if: ${{ steps.registry_status.outputs.already_published != 'true' }}
        run: bash scripts/install-mcp-publisher.sh

      - name: Publish MCP Registry metadata
        if: ${{ steps.registry_status.outputs.already_published != 'true' }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail
          doppler run -- bash -c "./mcp-publisher login github --token \"\$DOPPLER_GITHUB_SERVICE_TOKEN\""
          ./mcp-publisher publish

      - name: Confirm MCP Registry publication
        run: |
          set -euo pipefail
          SERVER_NAME="$(node -p "require('./server.json').name")"
          PKG_VER="$(node -p "require('./package.json').version")"
          SERVER_ID="$(node -e "console.log(encodeURIComponent(process.argv[1]))" "$SERVER_NAME")"
          LATEST_VER="$(
            curl -fsSL "https://registry.modelcontextprotocol.io/v0.1/servers/${SERVER_ID}/versions/latest" \
              | node -e "let d=''; process.stdin.on('data', c => d += c); process.stdin.on('end', () => console.log(JSON.parse(d).server?.version ?? ''));"
          )"
          test "$LATEST_VER" = "$PKG_VER"

      - name: Create organization GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          if gh release view "$RELEASE_VERSION" --repo oaslananka-lab/mcp-ssh-tool >/dev/null 2>&1; then
            gh release upload "$RELEASE_VERSION" artifacts/* --repo oaslananka-lab/mcp-ssh-tool --clobber
          else
            gh release create "$RELEASE_VERSION" \
              artifacts/* \
              --repo oaslananka-lab/mcp-ssh-tool \
              --target "$GITHUB_SHA" \
              --title "mcp-ssh-tool $RELEASE_VERSION" \
              --generate-notes
          fi
