name: Publish (Manual — GitHub Mirror Only)

# SADECE MANUEL TETİKLEME
# CI/CD Azure DevOps'ta çalışıyor.
# Bu workflow sadece doğrudan GitHub üzerinden acil publish gerektiğinde kullanılır.
on:
  workflow_dispatch:
    inputs:
      version_check:
        description: 'Confirm version in package.json is correct (type YES)'
        required: true
        default: ''

concurrency:
  group: publish-manual-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.version_check == 'YES' }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: npm ci

      - name: Guard - version must not already exist on npm
        run: |
          PKG_NAME="$(node -p "require('./package.json').name")"
          PKG_VER="$(node -p "require('./package.json').version")"
          echo "Checking ${PKG_NAME}@${PKG_VER} on npm..."
          if npm view "${PKG_NAME}@${PKG_VER}" version --silent > /dev/null 2>&1; then
            echo "ERROR: ${PKG_NAME}@${PKG_VER} already exists on npm."
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
