name: MCP Registry Publish

on:
  workflow_dispatch:
    inputs:
      publish:
        type: boolean
        default: true
      target:
        type: string
        default: official
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: mcp-registry-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ github.repository == 'oaslananka-lab/mcp-ssh-tool' && (inputs.publish == true || github.event_name == 'release') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Verify server metadata
        run: |
          test -f server.json || { echo "MCP_REGISTRY_CONFIG_MISSING"; exit 1; }
      - name: Install mcp-publisher
        run: |
          set -euo pipefail
          arch="$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')"
          os="$(uname -s | tr '[:upper:]' '[:lower:]')"
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_${os}_${arch}.tar.gz" | tar xz mcp-publisher
          sudo install -m 0755 mcp-publisher /usr/local/bin/mcp-publisher
      - name: Login via GitHub OIDC
        run: mcp-publisher login github-oidc
      - name: Validate server.json
        run: mcp-publisher publish --dry-run
      - name: Publish
        run: mcp-publisher publish
