name: Fast Lint and Metadata

on:
  push:
    branches:
      - main
      - "chore/**"
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - main
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:

permissions:
  contents: read

env:
  ACTIONLINT_VERSION: v1.7.12
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: meta-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  meta:
    name: Workflow and Metadata Lint
    if: ${{ github.repository == 'oaslananka-lab/mcp-ssh-tool' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.15.0
          package-manager-cache: false

      - name: Enable pnpm
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@11.0.9 --activate

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install actionlint
        run: |
          go install "github.com/rhysd/actionlint/cmd/actionlint@${ACTIONLINT_VERSION}"
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: 0.11.11
          enable-cache: false

      - name: Validate workflow guards
        run: node scripts/check-workflow-guards.mjs

      - name: Lint workflows
        run: bash scripts/run-workflow-lints.sh

      - name: Validate release metadata
        run: pnpm run sync-version -- --check && pnpm run validate:mcp-metadata && pnpm run validate:chatgpt-app && pnpm run validate:claude-connector
