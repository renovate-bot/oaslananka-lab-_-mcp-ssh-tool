name: Release task
description: Track release, registry, or supply-chain work.
title: "release: "
labels:
  - release
body:
  - type: dropdown
    id: release-area
    attributes:
      label: Area
      options:
        - npm trusted publishing
        - MCP Registry
        - GitHub Releases
        - CI/security gate
        - dependency maintenance
    validations:
      required: true
  - type: input
    id: target-version
    attributes:
      label: Target version
      placeholder: "v2.1.0"
    validations:
      required: true
  - type: textarea
    id: checklist
    attributes:
      label: Checklist
      description: Include verification commands and links to workflow runs.
    validations:
      required: true
