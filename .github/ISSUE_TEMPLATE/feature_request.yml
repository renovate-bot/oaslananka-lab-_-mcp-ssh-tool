name: Feature request
description: Propose a scoped improvement.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operational or client workflow does this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior, tool surface, or documentation change.
    validations:
      required: true
  - type: dropdown
    id: api-impact
    attributes:
      label: Public API impact
      options:
        - No runtime MCP API change
        - Adds a backward-compatible option or field
        - Changes existing runtime behavior
        - Unsure
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - ...
        - ...
    validations:
      required: true
