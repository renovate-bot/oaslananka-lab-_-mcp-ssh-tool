parameters:
  - name: nodeVersion
    type: string
    default: "24.15.0"

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: ${{ parameters.nodeVersion }}
    displayName: "Install Node.js ${{ parameters.nodeVersion }}"

  - script: |
      corepack enable
      corepack prepare pnpm@11.0.9 --activate
      pnpm install --frozen-lockfile
    displayName: "Install pnpm dependencies"
