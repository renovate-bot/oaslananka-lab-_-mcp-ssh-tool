name: 'GitHub Mirror - $(Date:yyyyMMdd).$(Rev:r)'

resources:
  repositories:
    - repository: githubMirror
      type: github
      endpoint: 'GitHub'
      name: 'oaslananka/mcp-ssh-tool'
      ref: 'refs/heads/main'

trigger: none

pr: none

pool:
  vmImage: 'ubuntu-latest'

jobs:
  - job: MirrorToGitHub
    displayName: 'Mirror to GitHub'
    steps:
      - checkout: self
        path: s/source
        fetchDepth: 0
        persistCredentials: true

      - checkout: githubMirror
        path: s/github
        fetchDepth: 0
        persistCredentials: true

      - script: |
          git remote add sourceRepo "$(Pipeline.Workspace)/s/source" || true
          git remote set-url sourceRepo "$(Pipeline.Workspace)/s/source"
          git remote add github "$(git remote get-url origin)" || true
          git remote set-url github "$(git remote get-url origin)"
        workingDirectory: '$(Pipeline.Workspace)/s/github'
        displayName: 'Attach source and GitHub remotes'

      - script: |
          git config user.email "ci@oaslananka.dev"
          git config user.name "Azure DevOps CI"
        workingDirectory: '$(Pipeline.Workspace)/s/github'
        displayName: 'Configure git identity'

      - script: |
          git fetch sourceRepo '+refs/*:refs/*' --prune --tags
          git fetch --all --tags
          git push github refs/heads/main:refs/heads/main --force
          git push github --tags
        workingDirectory: '$(Pipeline.Workspace)/s/github'
        displayName: 'Mirror Azure Repos to GitHub'
        env:
          GIT_TERMINAL_PROMPT: 0

      - script: |
          TAG=$(git tag --points-at HEAD | grep '^v' | head -1)
          if [ -z "$TAG" ]; then
            echo "No version tag on this commit. Skipping GitHub Release."
            exit 0
          fi

          PKG_VER=${TAG#v}
          awk "/## \[$PKG_VER\]/{flag=1; next} /## \[/{flag=0} flag" CHANGELOG.md | head -50 > github-release-notes.md
        workingDirectory: '$(Pipeline.Workspace)/s/source'
        displayName: 'Prepare GitHub release notes'
        condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/v'))

      - task: GitHubRelease@1
        displayName: 'Create GitHub Release'
        condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/v'))
        inputs:
          gitHubConnection: 'GitHub'
          repositoryName: 'oaslananka/mcp-ssh-tool'
          action: 'create'
          target: '$(Build.SourceVersion)'
          tagSource: 'gitTag'
          title: 'mcp-ssh-tool $(Build.SourceBranchName)'
          releaseNotesSource: 'filePath'
          releaseNotesFilePath: '$(Pipeline.Workspace)/s/source/github-release-notes.md'
          isDraft: false
          isPreRelease: false
