name: GitHub Mirror

trigger: none
pr: none

pool:
  vmImage: ubuntu-latest

steps:
  - checkout: self
    fetchDepth: 0

  - task: GitHubRelease@1
    displayName: Create GitHub Release
    condition: startsWith(variables['Build.SourceBranch'], 'refs/tags/v')
    inputs:
      gitHubConnection: GitHub
      repositoryName: oaslananka/mcp-ssh-tool
      action: create
      tagSource: gitTag
      title: mcp-ssh-tool $(Build.SourceBranchName)
      releaseNotesSource: inline
      releaseNotes: |
        See CHANGELOG.md for details.
      isDraft: false
      isPreRelease: false
