name: Release Validation

# Azure is manual-only validation. Release creation and publishing are owned by
# .github/workflows/release.yml in the canonical GitHub repository.
trigger: none
pr: none

pool:
  vmImage: "ubuntu-24.04"

variables:
  NODE_VERSION: "24.14.1"
  pnpm_config_store_dir: $(Pipeline.Workspace)/.pnpm-store

stages:
  - stage: Validate
    displayName: "Release Automation Validation"
    jobs:
      - job: ReleaseReadiness
        displayName: "Release readiness"
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: "$(NODE_VERSION)"
            displayName: "Install Node.js $(NODE_VERSION)"

          - script: |
              corepack enable
              corepack prepare pnpm@11.0.8 --activate
            displayName: "Enable pnpm"

          - task: Cache@2
            inputs:
              key: 'pnpm | "$(Agent.OS)" | pnpm-lock.yaml'
              restoreKeys: |
                pnpm | "$(Agent.OS)"
              path: $(pnpm_config_store_dir)
            displayName: "Cache pnpm packages"

          - script: pnpm install --frozen-lockfile
            displayName: "Install dependencies"

          - script: pnpm run check
            displayName: "Run release-quality gate"

          - script: pnpm run release:dry-run
            displayName: "Validate release-please readiness"

          - script: |
              mkdir -p artifacts
              pnpm run sbom
              PACKAGE_FILE=$(pnpm pack --pack-destination artifacts --json | node -e "let d=''; process.stdin.on('data', c => d += c); process.stdin.on('end', () => { const p = JSON.parse(d); const r = Array.isArray(p) ? p[0] : p; console.log(r.filename || r.name || r.path); });")
              sha256sum "artifacts/$PACKAGE_FILE" > "artifacts/$PACKAGE_FILE.sha256"
              sha256sum artifacts/sbom.cdx.json > artifacts/sbom.cdx.json.sha256
            displayName: "Generate validation artifacts"

          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: "artifacts"
              ArtifactName: "release-validation-artifacts"
            displayName: "Publish validation artifacts"
