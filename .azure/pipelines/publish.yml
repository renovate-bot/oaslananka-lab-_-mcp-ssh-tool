name: Publish — v$(PACKAGE_VERSION)

trigger: none

pool:
  vmImage: 'ubuntu-latest'

variables:
  NODE_VERSION: '20.x'
  npm_config_cache: $(Pipeline.Workspace)/.npm

stages:
  - stage: Validate
    displayName: 'Pre-publish Validation'
    jobs:
      - job: ValidateVersion
        displayName: 'Validate version consistency'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '$(NODE_VERSION)'
            displayName: 'Install Node.js $(NODE_VERSION)'

          - script: npm ci
            displayName: 'Install dependencies'

          - script: |
              PKG_VER=$(node -p "require('./package.json').version")
              MCP_VER=$(node -p "require('./mcp.json').version")
              SRC_VER=$(node -e "const fs=require('fs'); const text=fs.readFileSync('src/mcp.ts','utf8'); const match=text.match(/export const SERVER_VERSION = ['\\\"]([^'\\\"]+)['\\\"]/); if(!match){process.exit(1)} console.log(match[1])")

              echo "package.json: $PKG_VER"
              echo "mcp.json: $MCP_VER"
              echo "src/mcp.ts: $SRC_VER"

              if [ "$PKG_VER" != "$MCP_VER" ] || [ "$PKG_VER" != "$SRC_VER" ]; then
                echo "##vso[task.logissue type=error]Version mismatch! Run 'npm run sync-version' before tagging."
                exit 1
              fi

              echo "##vso[task.setvariable variable=PACKAGE_VERSION;isOutput=true]$PKG_VER"
            displayName: 'Check version consistency'
            name: SetVersion

          - script: |
              PKG_NAME=$(node -p "require('./package.json').name")
              PKG_VER=$(node -p "require('./package.json').version")

              if npm view "${PKG_NAME}@${PKG_VER}" version --silent > /dev/null 2>&1; then
                echo "##vso[task.logissue type=error]${PKG_NAME}@${PKG_VER} already exists on npm!"
                exit 1
              fi
              echo "Version ${PKG_VER} not yet published. Proceeding."
            displayName: 'Check npm version availability'

          - script: |
              TAG="${BUILD_SOURCEBRANCH#refs/tags/v}"
              PKG_VER=$(node -p "require('./package.json').version")
              if [ "$TAG" != "$PKG_VER" ]; then
                echo "##vso[task.logissue type=error]Git tag v${TAG} does not match package.json version ${PKG_VER}"
                exit 1
              fi
            displayName: 'Check tag matches package version'
            condition: startsWith(variables['Build.SourceBranch'], 'refs/tags/')

  - stage: Publish
    displayName: 'Publish to npm'
    dependsOn: Validate
    jobs:
      - deployment: PublishToNpm
        displayName: 'Publish package'
        environment: 'npm-production'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: NodeTool@0
                  inputs:
                    versionSpec: '$(NODE_VERSION)'
                  displayName: 'Install Node.js $(NODE_VERSION)'

                - script: npm ci
                  displayName: 'Install dependencies'

                - script: npm run lint
                  displayName: 'Final lint check'

                - script: npm test
                  displayName: 'Final test run'

                - script: npm run build
                  displayName: 'Production build'

                - task: Npm@1
                  inputs:
                    command: publish
                    publishRegistry: useExternalRegistry
                    publishEndpoint: npm-connection
                  displayName: 'Publish to npm registry via npm-connection'

  - stage: CreateRelease
    displayName: 'Create Azure DevOps Release'
    dependsOn: Publish
    jobs:
      - job: TagAndRelease
        displayName: 'Create release notes'
        steps:
          - script: |
              PKG_VER=$(node -p "require('./package.json').version")
              echo "Released mcp-ssh-tool v${PKG_VER} to npm"
              echo "##vso[build.addbuildtag]v${PKG_VER}"
              echo "##vso[build.addbuildtag]released"
            displayName: 'Tag build as released'
