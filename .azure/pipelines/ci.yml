name: CI — $(Date:yyyyMMdd).$(Rev:r)

trigger:
  branches:
    include:
      - main
      - develop
      - 'feature/*'
      - 'fix/*'
  paths:
    exclude:
      - '*.md'
      - '.gitattributes'
      - 'docs/**'

pr:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: 'ubuntu-latest'

variables:
  NODE_VERSION: '20.x'
  npm_config_cache: $(Pipeline.Workspace)/.npm

stages:
  - stage: Quality
    displayName: 'Quality Checks'
    jobs:
      - job: LintTypeCheck
        displayName: 'Lint & Type Check'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '$(NODE_VERSION)'
            displayName: 'Install Node.js $(NODE_VERSION)'

          - task: Cache@2
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: $(npm_config_cache)
            displayName: 'Cache npm packages'

          - script: npm ci
            displayName: 'Install dependencies'

          - script: npm run lint
            displayName: 'TypeScript type check'

          - script: npm run format:check
            displayName: 'Prettier check'

          - script: npm audit --audit-level=moderate
            displayName: 'Security audit'

          - script: npm run licenses:check
            displayName: 'License compliance check'

      - job: Test
        displayName: 'Unit Tests'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '$(NODE_VERSION)'
            displayName: 'Install Node.js $(NODE_VERSION)'

          - script: npm ci
            displayName: 'Install dependencies'

          - script: npm run test:coverage
            displayName: 'Run tests with coverage'

          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '**/test-results/*.xml'
              mergeTestResults: true
              testRunTitle: 'Unit Tests'
            displayName: 'Publish test results'

          - task: PublishCodeCoverageResults@2
            condition: always()
            inputs:
              codeCoverageTool: 'Cobertura'
              summaryFileLocation: 'coverage/cobertura-coverage.xml'
              reportDirectory: 'coverage/lcov-report'
            displayName: 'Publish code coverage'

      - job: Integration
        displayName: 'Integration Tests'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '$(NODE_VERSION)'
            displayName: 'Install Node.js $(NODE_VERSION)'

          - script: npm ci
            displayName: 'Install dependencies'

          - script: docker compose up -d ssh-server
            displayName: 'Start SSH integration fixture'

          - script: npm run test:integration
            displayName: 'Run integration tests'
            env:
              RUN_SSH_INTEGRATION: '1'
              TEST_SSH_HOST: 'localhost'
              TEST_SSH_PORT: '2222'
              TEST_SSH_USER: 'testuser'
              TEST_SSH_PASS: 'testpass'

          - script: docker compose down --remove-orphans
            condition: always()
            displayName: 'Stop SSH integration fixture'

      - job: Build
        displayName: 'Build'
        dependsOn:
          - LintTypeCheck
          - Test
          - Integration
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '$(NODE_VERSION)'
            displayName: 'Install Node.js $(NODE_VERSION)'

          - script: npm ci
            displayName: 'Install dependencies'

          - script: npm run build
            displayName: 'TypeScript build'

          - script: npm run pack:check
            displayName: 'Verify package contents'

          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: 'dist'
              ArtifactName: 'dist'
            displayName: 'Publish build artifacts'
