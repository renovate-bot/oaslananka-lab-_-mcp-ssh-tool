repos:
  - repo: local
    hooks:
      - id: npm-format-check
        name: npm format check
        entry: npm run format:check
        language: system
        pass_filenames: false
        stages: [pre-commit, manual]

      - id: npm-lint
        name: npm lint
        entry: npm run lint
        language: system
        pass_filenames: false
        stages: [pre-commit, manual]

      - id: npm-typecheck
        name: npm typecheck
        entry: npm run typecheck
        language: system
        pass_filenames: false
        stages: [pre-push, manual]

      - id: npm-unit-tests
        name: npm unit tests
        entry: npm test
        language: system
        pass_filenames: false
        stages: [pre-push, manual]
